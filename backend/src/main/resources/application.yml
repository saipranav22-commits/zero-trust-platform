server:
  port: 8081
  error:
    include-message: always
    include-binding-errors: always

spring:
  application:
    name: zero-trust-platform

  datasource:
    url: jdbc:postgresql://localhost:5432/zerotrust_db
    username: zerotrust
    password: zerotrust123
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

jwt:
  secret: "zerotrust-platform-super-secret-key-for-hs256-algorithm-must-be-at-least-256-bits"
  access-token-expiry-ms: 900000       # 15 minutes
  refresh-token-expiry-ms: 604800000   # 7 days

app:
  security:
    max-failed-logins: 5
    lockout-duration-minutes: 15
    cors-allowed-origins: "http://localhost:3000,http://localhost:5173"

  threat-detection:
    brute-force-threshold: 10
    brute-force-window-minutes: 5
    exfiltration-threshold: 1000
    exfiltration-window-minutes: 5

  ai:
    enabled: false   # Set to true and provide gemini-api-key to enable RAG
    gemini-api-key: ""
    gemini-model: "gemini-1.5-flash"
    gemini-api-url: "https://generativelanguage.googleapis.com/v1beta/models"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
  info:
    title: Zero Trust Security Platform API
    version: "1.0"
    description: "AI-Powered Zero Trust Data Protection Platform"

logging:
  level:
    com.zerotrust: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{userId}] %logger{36} - %msg%n"
